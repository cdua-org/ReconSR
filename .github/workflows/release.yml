name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Extract Licenses
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses save ./... --save_path=third_party_licenses/

      - name: Build and Archive
        run: |
          mkdir -p release_assets
          
          # List of OS/ARCH targets
          TARGETS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"
          
          for target in $TARGETS; do
            GOOS=${target%/*}
            GOARCH=${target#*/}
            echo "Building for $GOOS/$GOARCH..."
            
            mkdir -p "build_${GOOS}_${GOARCH}"
            cp -r third_party_licenses "build_${GOOS}_${GOARCH}/"
            
            if [ "$GOOS" = "windows" ]; then
              GOOS=$GOOS GOARCH=$GOARCH go build -o "build_${GOOS}_${GOARCH}/ReconSR.exe" ./cmd/ReconSR-cli
              cd "build_${GOOS}_${GOARCH}"
              zip -r "../release_assets/ReconSR-${GOOS}-${GOARCH}.zip" ./*
              cd ..
            else
              GOOS=$GOOS GOARCH=$GOARCH go build -o "build_${GOOS}_${GOARCH}/ReconSR" ./cmd/ReconSR-cli
              cd "build_${GOOS}_${GOARCH}"
              tar -czvf "../release_assets/ReconSR-${GOOS}-${GOARCH}.tar.gz" ./*
              cd ..
            fi
          done

      - name: Publish Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
