name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Extract Licenses
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses save ./... --save_path=third_party_licenses/ --ignore cdua-org/ReconSR --confidence_threshold 0.85

      - name: Build and Archive
        run: |
          mkdir -p release_assets

          # List of OS/ARCH targets
          TARGETS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64"

          for target in $TARGETS; do
            GOOS=${target%/*}
            GOARCH=${target#*/}
            echo "Building for $GOOS/$GOARCH..."

            mkdir -p "build_${GOOS}_${GOARCH}"
            cp -r third_party_licenses "build_${GOOS}_${GOARCH}/"
            cp LICENSE "build_${GOOS}_${GOARCH}/"
            cp README.md "build_${GOOS}_${GOARCH}/"

            FRIENDLY_OS=$GOOS
            FRIENDLY_ARCH=$GOARCH

            if [ "$GOOS" = "darwin" ]; then
              FRIENDLY_OS="macos"
              if [ "$GOARCH" = "amd64" ]; then
                FRIENDLY_ARCH="intel"
              elif [ "$GOARCH" = "arm64" ]; then
                FRIENDLY_ARCH="apple-silicon"
              fi
            elif [ "$GOOS" = "windows" ]; then
              if [ "$GOARCH" = "amd64" ]; then
                FRIENDLY_ARCH="x64"
              fi
            fi

            if [ "$GOOS" = "windows" ]; then
              GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "-X 'cdua-org/ReconSR/internal/cli.AppVersion=${{ github.ref_name }}'" -o "build_${GOOS}_${GOARCH}/ReconSR.exe" ./cmd/ReconSR-cli
              cd "build_${GOOS}_${GOARCH}"
              zip -r "../release_assets/ReconSR-${FRIENDLY_OS}-${FRIENDLY_ARCH}.zip" ./*
              cd ..
            else
              GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "-X 'cdua-org/ReconSR/internal/cli.AppVersion=${{ github.ref_name }}'" -o "build_${GOOS}_${GOARCH}/ReconSR" ./cmd/ReconSR-cli
              cd "build_${GOOS}_${GOARCH}"
              tar -czvf "../release_assets/ReconSR-${FRIENDLY_OS}-${FRIENDLY_ARCH}.tar.gz" ./*
              cd ..
            fi
          done

      - name: Publish Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
