name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Build Binary
        run: |
          mkdir -p temp_build
          if [ "${{ matrix.os }}" = "windows" ]; then
            GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o temp_build/ReconSR.exe ./cmd/ReconSR-cli
          else
            GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o temp_build/ReconSR ./cmd/ReconSR-cli
          fi

      - name: Extract Licenses
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses save ./... --save_path=temp_build/third_party_licenses/

      - name: Create Archive
        run: |
          cd temp_build
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip -r ../ReconSR-${{ matrix.os }}-${{ matrix.arch }}.zip ./*
          else
            tar -czvf ../ReconSR-${{ matrix.os }}-${{ matrix.arch }}.tar.gz ./*
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            ReconSR-${{ matrix.os }}-${{ matrix.arch }}.zip
            ReconSR-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
